name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ixmxamar/comfyui-ultimate

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Relocate Docker storage to /mnt (~70GB) for the ~20GB image + cache
        run: |
          sudo systemctl stop docker docker.socket || true
          sudo mkdir -p /mnt/docker
          echo '{ "data-root": "/mnt/docker" }' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          docker info | grep -i "docker root dir" || true
          df -h / /mnt || true

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # smoke_test.py + pip check run INSIDE the build (Dockerfile step 11);
      # a constraints/ABI regression therefore fails this build step.
      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:ci-${{ github.sha }}
          provenance: false

      - name: Node-import gate (all 29 packs must import)
        # --entrypoint bash overrides the image ENTRYPOINT (start.sh) so we actually
        # run the gate script (not launch full ComfyUI without --cpu).
        run: docker run --rm --entrypoint bash ${{ env.IMAGE }}:ci-${{ github.sha }} /opt/scripts/ci_node_import_gate.sh

      - name: Tag + push (only on push / dispatch, after gates pass)
        if: github.event_name != 'pull_request'
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          docker tag ${{ env.IMAGE }}:ci-${{ github.sha }} ${{ env.IMAGE }}:latest
          docker tag ${{ env.IMAGE }}:ci-${{ github.sha }} ${{ env.IMAGE }}:$SHA
          docker tag ${{ env.IMAGE }}:ci-${{ github.sha }} ${{ env.IMAGE }}:cu128-torch2.8.0
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:$SHA
          docker push ${{ env.IMAGE }}:cu128-torch2.8.0
